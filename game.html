<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RWIN Practice</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="gameContainer">

<!-- Header -->

<header class="topBar">

<div>

<h1>🎮 Practice Arena</h1>

<p>Virtual Practice Mode</p>

</div>

<div class="profileIcon">

👤

</div>

</header>

<!-- Live -->

<div class="liveStatus">

<span class="liveDot"></span>

LIVE PRACTICE

</div>

<!-- Balance -->

<section class="balanceCard">

<p>Virtual Practice Coins</p>

<h1 id="balanceText">₹10,000</h1>

<span>Unlimited Reset During Membership</span>

</section>

<!-- Timer -->

<section class="timerCard">

<h2>⏱ Next Round</h2>

<h1 id="timer">30</h1>

</section>

<!-- Bet Amount -->

<section class="membershipCard">

<h3>💰 Select Practice Coins</h3>

<div class="numberGrid">

<button class="betBtn">100</button>

<button class="betBtn">500</button>

<button class="betBtn">1000</button>

<button class="betBtn">5000</button>

<button class="betBtn">10000</button>

</div>

<p id="betStatus">

No Coins Selected

</p>

</section>
